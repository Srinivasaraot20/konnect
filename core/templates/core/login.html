{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Konnect Projects</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    :root {
      --royal-blue: #1a2e6e;
      --gold: #c9a84c;
      --gold-light: #e4c06e;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, var(--royal-blue) 0%, #0b1228 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Decorative Background Elements */
    .bg-circle-1 {
      position: absolute;
      top: -100px;
      left: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, var(--gold), transparent);
      filter: blur(80px);
      opacity: 0.3;
      z-index: 0;
      animation: float 10s ease-in-out infinite;
    }
    .bg-circle-2 {
      position: absolute;
      bottom: -150px;
      right: -50px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, #3a5bd6, transparent);
      filter: blur(100px);
      opacity: 0.3;
      z-index: 0;
      animation: float 15s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }
    
    /* Glassmorphism Card */
    .login-card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease-out forwards;
      opacity: 0;
      transform: translateY(30px);
    }
    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .login-logo {
      height: 50px;
      margin-bottom: 24px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }
    
    .form-control {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.95rem;
      min-height: 48px;
    }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--gold-light);
      box-shadow: 0 0 0 0.25rem rgba(201, 168, 76, 0.25);
      color: #fff;
    }
    .form-control::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    
    .password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      z-index: 5;
    }
    .password-toggle:hover {
      color: #fff;
    }
    
    .btn-login {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.5px;
      transition: all 0.3s;
      min-height: 48px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(201, 168, 76, 0.3);
      color: #000;
    }
    
    .form-check-input {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
    }
    .form-check-input:checked {
      background-color: var(--gold);
      border-color: var(--gold);
    }
    .form-check-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.85rem;
    }
    
    .alert-custom {
      background: rgba(220, 53, 69, 0.2);
      border: 1px solid rgba(220, 53, 69, 0.4);
      color: #ffcccc;
      font-size: 0.85rem;
      border-radius: 8px;
    }
    
    .back-link {
      position: absolute;
      top: 30px;
      left: 30px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
      z-index: 20;
    }
    .back-link:hover {
      color: #fff;
    }
    @media(max-width: 576px) {
      .login-card { margin: 20px; padding: 30px 20px; }
      .back-link { top: 15px; left: 15px; }
    }
  </style>
</head>
<body>

  <a href="{% url 'core:home' %}" class="back-link"><i class="fas fa-arrow-left me-2"></i> Back to Website</a>

  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>

  <div class="login-card">
    <div class="text-center">
      <img src="{% static 'image.png' %}" alt="Konnect Projects" class="login-logo">
      <h2 class="text-white fw-bold mb-1" style="font-size: 1.5rem;">Welcome Back</h2>
      <p style="color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-bottom: 24px;">Sign in to access your admin dashboard.</p>
    </div>

    {% if error %}
      <div class="alert alert-custom p-2 mb-3 text-center">
        <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
      </div>
    {% endif %}

    <form method="POST" action="{% url 'core:login' %}">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label text-white-50" style="font-size: 0.85rem;">Email Address or Username</label>
        <div class="position-relative">
          <input type="text" name="email" class="form-control ps-4" placeholder="admin@example.com or username" required autofocus>
          <i class="fas fa-envelope position-absolute" style="left: 12px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4);"></i>
        </div>
      </div>
      
      <div class="mb-3">
        <label class="form-label text-white-50" style="font-size: 0.85rem;">Password</label>
        <div class="position-relative">
          <input type="password" name="password" id="passwordField" class="form-control ps-4 pe-5" placeholder="••••••••" required>
          <i class="fas fa-lock position-absolute" style="left: 12px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4);"></i>
          <i class="fas fa-eye password-toggle" id="togglePassword"></i>
        </div>
      </div>
      
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="rememberMe" name="remember">
          <label class="form-check-label" for="rememberMe">Remember me</label>
        </div>
        <!-- <a href="#" style="color: var(--gold-light); font-size: 0.85rem; text-decoration: none;">Forgot Password?</a> -->
      </div>
      
      <button type="submit" class="btn btn-login w-100">Login to Dashboard</button>
    </form>
  </div>

  <script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#passwordField');

    togglePassword.addEventListener('click', function (e) {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });
  </script>
</body>
</html>
