{% extends 'dashboard/base.html' %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="mb-4">
    <h2 class="fw-bold m-0">Website Settings</h2>
    <p class="text-muted m-0">Configure global website parameters.</p>
</div>

<div class="glass-card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <label class="form-label fw-bold">Website Name</label>
                <input type="text" name="website_name" class="form-control" value="{{ settings.website_name }}">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Admin/Contact Email</label>
                <input type="email" name="admin_email" class="form-control" value="{{ settings.admin_email }}">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Contact Number</label>
                <input type="text" name="contact_number" class="form-control" value="{{ settings.contact_number }}">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">WhatsApp Number</label>
                <input type="text" name="whatsapp_number" class="form-control" value="{{ settings.whatsapp_number }}">
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Logo</label>
                <input type="file" name="logo" class="form-control" accept="image/*">
                {% if settings.logo %}
                    <small class="text-muted mt-1 d-block">Current: <a href="{{ settings.logo.url }}" target="_blank">View Logo</a></small>
                {% endif %}
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Favicon</label>
                <input type="file" name="favicon" class="form-control" accept="image/*">
            </div>
        </div>
        
        <div class="border-top pt-4 text-end">
            <button type="submit" class="btn btn-primary-custom px-4"><i class="fas fa-save me-2"></i> Save Settings</button>
        </div>
    </form>
</div>
{% endblock %}
